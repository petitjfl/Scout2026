; Balises de Veille — Wemos D1 mini lite (ESP8266) + anneau NeoPixel 6 LEDs
;
; Un environnement par balise physique : l'identité (DEVICE_ID / DEVICE_NAME)
; est injectée par build flag, plus besoin de modifier le code avant de flasher.
;
;   pio run -e balise_nord -t upload      (idem balise_sud / balise_est / balise_ouest)
;
; DEBUG_MODE=1 : port série actif, pas de deep-sleep (développement).
; AVANT LE CAMP : passer DEBUG_MODE à 0 ci-dessous (série coupée, deep-sleep le
; jour activé — exige D0/GPIO16 relié à RST sur le D1 mini).

[platformio]
; IMPORTANT: les actions Build/Upload sans "-e" utilisent cet environnement.
; Changez cette valeur pour choisir la balise "par défaut" dans l'UI.
default_envs = balise_est

[env]
platform = espressif8266
board = d1_mini_lite
framework = arduino
monitor_speed = 115200
lib_deps = fastled/FastLED@^3.10.3
build_flags = -DDEBUG_MODE=1

[env:balise_nord]
build_flags = ${env.build_flags} -DDEVICE_ID=1 -DDEVICE_NAME=\"Balise_Nord\"

[env:balise_sud]
build_flags = ${env.build_flags} -DDEVICE_ID=2 -DDEVICE_NAME=\"Balise_Sud\"

[env:balise_est]
build_flags = ${env.build_flags} -DDEVICE_ID=3 -DDEVICE_NAME=\"Balise_Est\"

[env:balise_ouest]
build_flags = ${env.build_flags} -DDEVICE_ID=4 -DDEVICE_NAME=\"Balise_Ouest\"
