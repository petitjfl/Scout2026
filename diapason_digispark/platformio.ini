; PlatformIO Project Configuration File
; Diapason des Sentiers — Digispark (ATtiny85, ~6 Ko flash utile, 512 o RAM)
; Autonome / hors réseau : lit des cartes RFID "true/false" et répond par une
; vibration propre (vrai) ou un bourdonnement laid (faux).

[env:digispark-tiny]
platform = atmelavr
board = digispark-tiny
framework = arduino
; Upload via micronucleus (brancher le Digispark quand l'IDE le demande).
upload_protocol = micronucleus
