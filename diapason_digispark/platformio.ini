; Diapason des Sentiers — Digispark Pro (ATtiny167, ~14.5 Ko flash, 512 o RAM)
; Prop autonome / hors réseau : lit des cartes RFID « true/false » et répond par
; une vibration propre (vrai) ou un bourdonnement laid (faux). Backup IR (NEC).
;
;   pio run -t upload   (upload via micronucleus : brancher le Digispark Pro quand
;                        l'outil le demande)

[env:digispark-pro]
platform = atmelavr
board = digispark-pro
framework = arduino
upload_protocol = micronucleus
