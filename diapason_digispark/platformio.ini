; Diapason des Sentiers — Digispark (ATtiny85, ~6 Ko flash utile, 512 o RAM)
; Prop autonome / hors réseau : lit des cartes RFID « true/false » et répond par
; une vibration propre (vrai) ou un bourdonnement laid (faux). Backup IR (NEC).
;
;   pio run -t upload   (upload via micronucleus : brancher le Digispark quand
;                        l'outil le demande)

[env:digispark-tiny]
platform = atmelavr
board = digispark-tiny
framework = arduino
upload_protocol = micronucleus
