; Médaillon du Dernier Accord — Wemos D1 mini lite (ESP8266) + anneau NeoPixel
;
; L'identité (DEVICE_ID / DEVICE_NAME) est injectée par build flag ; ajouter un
; environnement par médaillon supplémentaire (plage d'ID 20–29).
;
;   pio run -e medaillon_1 -t upload
;
; DEBUG_MODE=1 : port série actif (développement). Passer à 0 avant le camp.

[env]
platform = espressif8266
board = d1_mini_lite
framework = arduino
monitor_speed = 115200
lib_deps = fastled/FastLED@^3.10.3
build_flags = -DDEBUG_MODE=1

[env:medaillon_1]
build_flags = ${env.build_flags} -DDEVICE_ID=20 -DDEVICE_NAME=\"Medaillon_1\"
